# ============================================================
#  FastBuild — GitHub Actions: PR build (compile only, no publish)
#
#  Copy this file to your AL workspace repository at:
#    .github/workflows/build-pr.yml
#
#  Before first use:
#    1. Set the 'fastbuild-repo' env var below to match your
#       GitHub org/repo name for the FastBuild scripts.
#    2. If FastBuild is a private repo, create a repository
#       secret named FASTBUILD_TOKEN (classic PAT with 'repo'
#       scope) and uncomment the token line in the checkout step.
# ============================================================

name: Build BC Workspace

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner'
        required: false
        default: 'ubuntu-slim'
        type: choice
        options:
          - ubuntu-slim
          - ubuntu-latest
          - windows-latest

env:
  FASTBUILD_REPO: fufikk-org/fastbuild

jobs:
  build:
    name: Compile BC apps
    runs-on: ${{ inputs.runner || 'ubuntu-slim' }}

    steps:

      # ── Checkout the AL workspace (this repo) ──────────────────
      - name: Checkout AL workspace
        uses: actions/checkout@v4
        with:
          path: workspace

      # ── Ensure .NET SDK is available (pre-installed on ubuntu-latest; ──
      # ── missing on ubuntu-slim and other minimal runners)           ──
      - name: Check for .NET SDK
        id: check-dotnet
        shell: bash
        run: |
          if command -v dotnet &>/dev/null; then
            echo "found=true"  >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Resolve the install path that setup-dotnet will use on this runner.
      # Captured before the install so restore and save reference the same directory.
      # Defaults to /usr/share/dotnet (standard ubuntu runner location) when DOTNET_ROOT
      # is not yet set.
      - name: Resolve .NET install path
        id: dotnet-path
        if: steps.check-dotnet.outputs.found == 'false'
        shell: bash
        run: echo "dir=${DOTNET_ROOT:-/usr/share/dotnet}" >> "$GITHUB_OUTPUT"

      - name: Restore .NET SDK cache
        id: dotnet-cache
        if: steps.check-dotnet.outputs.found == 'false'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.dotnet-path.outputs.dir }}
          key: fastbuild-dotnet-8

      - name: Set up .NET SDK
        if: steps.check-dotnet.outputs.found == 'false' && steps.dotnet-cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Save .NET SDK cache
        if: steps.check-dotnet.outputs.found == 'false' && steps.dotnet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.dotnet-path.outputs.dir }}
          key: fastbuild-dotnet-8

      # Add dotnet to PATH whether it came from cache or a fresh install.
      - name: Add .NET to PATH
        if: steps.check-dotnet.outputs.found == 'false'
        shell: bash
        run: |
          echo "${{ steps.dotnet-path.outputs.dir }}"       >> "$GITHUB_PATH"
          echo "${{ steps.dotnet-path.outputs.dir }}/tools" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=${{ steps.dotnet-path.outputs.dir }}" >> "$GITHUB_ENV"

      # ── Checkout FastBuild scripts ──────────────────────────────
      - name: Checkout FastBuild
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FASTBUILD_REPO }}
          path: fastbuild
          token: ${{ secrets.FASTBUILD_TOKEN }}   # uncomment for private repo

      # ── Compute .alpackages cache key ───────────────────────────
      # Queries MSSymbols for the BC platform version and AppSource
      # for each ISV dependency. Custom/internal packages are excluded
      # (always downloaded fresh, never cached).
      - name: Compute symbol cache key
        id: cache-key
        shell: pwsh
        run: |
          & "${{ github.workspace }}/fastbuild/Get-BCCacheKey.ps1" `
            -WorkspacePath "${{ github.workspace }}/workspace"

      # ── Restore .alpackages cache (MS + ISV symbols) ────────────
      - name: Restore symbol cache
        id: symbol-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/.alpackages
          key: ${{ steps.cache-key.outputs.cache-key }}

      # ── Download MS + ISV symbols on cache miss ─────────────────
      # Skipped entirely when the cache is restored above.
      # The save step below runs immediately after, before compilation,
      # so compiled workspace .app files do not pollute the cache.
      - name: Download symbols
        if: steps.symbol-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "${{ github.workspace }}/fastbuild/Get-ALSymbols.ps1" `
            -WorkspacePath "${{ github.workspace }}/workspace" `
            -Country       "${{ steps.cache-key.outputs.country }}"

      # ── Save symbol cache ────────────────────────────────────────
      # Saved here (after download, before compilation) so the cache
      # contains only symbol packages, not compiled workspace apps.
      - name: Save symbol cache
        if: steps.symbol-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: workspace/.alpackages
          key: ${{ steps.cache-key.outputs.cache-key }}

      # ── Build (compile only — symbols already in .alpackages) ───
      # Get-ALSymbols inside Build-BCWorkspace skips download because
      # .alpackages already contains files from the cache/download steps.
      - name: Build BC workspace
        shell: pwsh
        run: |
          & "${{ github.workspace }}/fastbuild/Build-BCWorkspace.ps1" `
            -WorkspacePath "${{ github.workspace }}/workspace" `
            -UpdateTool `
            -PreRelease

      # ── Upload compiled .app files as workflow artifact ──────────
      - name: Upload compiled apps
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: BCApps
          path: ${{ github.workspace }}/workspace/.output/*.app
          if-no-files-found: warn
